- name: Report to Telegram
        if: ${{ secrets.TG_TOKEN != '' }}
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
        run: |
          set -euo pipefail

          cd build || { echo "❌ build folder not found"; exit 1; }

          TG_CHAT="@morphe-modules-apks"

          echo "📡 Preparing Telegram message..."

          NL=$'\n'
          APKS=""
          MODULES=""

          for OUTPUT in *; do
            DL_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ steps.next_ver_code.outputs.NEXT_VER_CODE }}/${OUTPUT}"

            if [[ "$OUTPUT" == *.apk ]]; then
              APKS+="${NL}📦 ${OUTPUT} - ${DL_URL}"
            elif [[ "$OUTPUT" == *.zip ]]; then
              MODULES+="${NL}📦 ${OUTPUT} - ${DL_URL}"
            fi
          done

          MODULES=${MODULES#"$NL"}
          APKS=${APKS#"$NL"}

          BODY="$(sed 's/^\* \*\*/↪ **/g; s/^\* `/↪ **/g; s/`/*/g; s/^\* /↪ /g; s/\*\*/\*/g; s/###//g; s/^- /↪ /g; /^==/d;' ../build.md)"

          MSG="🚀 *New Build Released!*

${BODY}

📦 *Modules*
${MODULES}

📱 *APKs*
${APKS}

🌟 Builder:
https://github.com/sixstrings/morphe-builder
"

          echo "📨 Telegram message prepared (preview trimmed):"
          echo "${MSG:0:500}"

          # Telegram limits safety
          MSG="${MSG:0:3900}"

          PAYLOAD=$(cat <<EOF
{
  "chat_id": "${TG_CHAT}",
  "text": "${MSG}",
  "parse_mode": "Markdown",
  "disable_web_page_preview": true
}
EOF
)

          echo "📡 Sending request to Telegram..."

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "📡 Telegram HTTP Code: $HTTP_CODE"
          echo "📡 Telegram Response: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Telegram notification failed"
            exit 0   # bewusst kein Pipeline-Fail
          fi

          echo "✅ Telegram notification sent successfully"
