name: Telegram Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Debug Start
        run: echo "Workflow gestartet 👍"

      - name: Send Telegram Test Message
        run: |
          MESSAGE="Test erfolgreich - GitHub zu Telegram Verbindung steht 🚀"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TG_CHAT_TEST }} \
            -d text="$MESSAGE"